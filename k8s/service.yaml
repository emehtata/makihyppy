apiVersion: v1
kind: Service
metadata:
  name: makihyppy
  namespace: makihyppy
  labels:
    app.kubernetes.io/name: makihyppy
    app.kubernetes.io/component: web
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: makihyppy
  ports:
    - name: http
      protocol: TCP
      port: 8877
      targetPort: http