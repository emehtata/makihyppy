apiVersion: apps/v1
kind: Deployment
metadata:
  name: makihyppy
  namespace: makihyppy
  labels:
    app.kubernetes.io/name: makihyppy
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: makihyppy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: makihyppy
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: makihyppy
          image: registry.biergartenrajis.fi/makihyppy:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8877
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi